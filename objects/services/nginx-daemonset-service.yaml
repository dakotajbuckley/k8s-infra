apiVersion: v1
kind: Service
metadata:
  name: nginx-daemonset-service
  labels:
    app: nginx-daemonset
  annotations:
    external-dns.alpha.kubernetes.io/hostname: nginx.dakotabuilds.dev
    external-dns.alpha.kubernetes.io/target: 1.2.3.4
spec:
  type: NodePort
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30100
  selector:
    app: nginx-daemonset