alertmanager:
  enabled: false
prometheus-pushgateway:
  enabled: false
kube-state-metrics:
  enabled: false
prometheus-node-exporter:
  enabled: false
server:
      global:
        external_labels:
          cluster: prometheus-secondary
      hostAliases:
      - ip: "10.0.0.247"
        hostnames:
        - "prometheus.dakotabuilds.dev"
      remoteWrite:
        - url: https://prometheus.dakotabuilds.dev/api/v1/write