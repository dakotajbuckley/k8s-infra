apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd # Must be the namespace where Argo CD is installed
  finalizers:
    - resources-finalizer.argocd.argoproj.io # Deletes K8s resources when App is deleted
spec:
  project: default
  source:
    repoURL: https://github.com/dakotajbuckley/k8s-infra.git
    targetRevision: HEAD
    path: nginx-pod
  destination:
    server: https://kubernetes.default.svc
    namespace: my-app-namespace
  syncPolicy:
    automated: # Enables automatic syncing
      prune: true # Delete resources no longer in Git
      selfHeal: true # Revert manual changes made in the cluster