apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-secondary
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: prometheus
    targetRevision: 29.2.1
    helm:
      releaseName: prometheus-secondary
      values: |
        alertmanager:
          enabled: false
        prometheus-pushgateway:
          enabled: false
        kube-state-metrics:
          enabled: false
        prometheus-node-exporter:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring-secondary

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true