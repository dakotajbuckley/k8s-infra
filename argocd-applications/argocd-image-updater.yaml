apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-image-updater
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://argoproj.github.io/argo-helm
      targetRevision: 0.12.0
      chart: argocd-image-updater
      helm:
        valueFiles:
          - $values/values/argocd-image-updater/values.yaml
    - repoURL: git@github.com:dakotajbuckley/kubernetes-configurations.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true