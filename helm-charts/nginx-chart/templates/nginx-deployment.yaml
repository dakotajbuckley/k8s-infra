apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: nginx-chart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-chart
  template:
    metadata:
      name: nginx-chart
      labels:
        app: nginx-chart
    spec:
      containers:
        - name: nginx
          image: nginx:trixie